name: Daily AI News Report

on:
  schedule:
    - cron: "0 0 * * *"  # 每天北京时间8点运行
  workflow_dispatch:     # 允许手动触发

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6  # 适配Node.js24

      - name: Set up Python
        uses: actions/setup-python@v6  # 适配Node.js24
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 用更稳定的googletrans替代translate库
          pip install feedparser requests googletrans==4.0.0-rc1

      - name: Run news script
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python main.py
